<!DOCTYPE html>
<html>
<head>
  <title>Time Loop Tycoon</title>
  <link rel="stylesheet" href="./styles/default.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="top-bar">
    <div class="brand">⏳ Time Loop Tycoon</div>
    
    <div class="meta">
      <div>Spare Time: <span id="sparetime">0</span></div>
    </div>


    <div class="nav">
      <button class="nav-btn">Loop</button>
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="game-area">

    <!-- LOOP GRID (future-proof) -->
    <div class="loop-grid">

      <!-- ACTIVE LOOP -->
      <div class="loop-card">

        <div class="loop-header">
            <div id="loop-progress-bar"></div>

            <div class="loop-header-content">
                <div class="ctext"><div>Loop #<span id="loop">0</span></div></div>
                <div class="ctext"><div>⏲️ <span id="curtime">0</span> / <span id="duration">0</span>s</div></div>
            </div>
        </div>

        <div class="loop-inner">

          <div class="stats">
            <div>💰 Resource: <span id="resource">0</span></div>
            <div>🧠 Knowledge: <span id="knowledge">0</span></div>
            <div>😴 Rested: <span id="rested">1.0</span>x</div>
          </div>

          <div class="actions">
            <button id="work" class="grow">Work</button>
            <button id="study" class="grow">Study</button>
            <button id="sleep" class="grow">Sleep</button>
          </div>

          <div class="progress">
            Current Action: <span id="action">None</span>
          </div>

            <button id="cheat1" class="grow">skip</button>
        </div>
      </div>

      <!-- EMPTY SLOTS (important for future expansion) -->
      <div class="loop-card empty">🔒</div>
      <!--
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>

      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
      <div class="loop-card empty"></div>
        -->
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="nav">
        <button onclick="saveGame()">Save</button>
        <button onclick="loadGame()">Load</button>
        <button onclick="resetGame()">Reset</button>
    </div>
    
    <div class="nav">
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
    </div>

  </div>

  <script type="module" src="./src/game.js"></script>
</body>
</html>

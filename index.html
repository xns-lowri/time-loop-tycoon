<!DOCTYPE html>
<html>
<head>
  <title>Time Loop Tycoon</title>
  <link rel="stylesheet" href="./styles/default.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="top-bar">
    <div class="brand">⏳ Time Loop Tycoon</div>
    
    <div class="meta">
      <span>Spare Time:</span>&nbsp;&nbsp;<span id="sparetime">0</span>
    </div>


    <div class="nav lmargin">
      <button class="nav-btn">Loop</button>
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div id="game-area" class="game-area">

    <!-- LOOP GRID -->
    <div id="loop-grid" class="loop-grid">

      <!-- ACTIVE LOOP -->
      <div id="loop-card-0" class="loop-card">

        <div class="loop-header">
            <div id="loop-progress-bar" class="loop-progress-bar"></div>

            <div class="loop-header-content">
                <div class="ctext"><div>Loop #<span id="loop">0</span></div></div>
                <div class="ctext"><div>⏲️ <span id="curtime">0</span> / <span id="duration">0</span>s</div></div>
            </div>
        </div>

        <div class="loop-inner">

          <div id="stats" class="stats">
            <div>💰 Resource: <span id="resource">0</span></div>
            <div>🧠 Knowledge: <span id="knowledge">0</span></div>
            <div>😴 Rested: <span id="rested">1.0</span>x</div>
          </div>

          <div id="actions" class="actions">
            <button id="work" class="action-btn grow">Work</button>
            <button id="study" class="action-btn grow">Study</button>
            <button id="sleep" class="action-btn grow">Sleep</button>
          </div>

          <div id="progress" class="progress">
            <div class="ctext"><div>Currently <span id="action">None</span>ing</div></div>
            
            <div>
              <button id="automation" class="smaller locked">🔒</button>
              <button id="augments" class="smaller">⚙️</button>
            </div>
          </div>
          <div>
            <button id="skip" class="grow">skip</button>
            <button id="add1" class="grow">+1s</button>
            <button id="add10" class="grow">+10s</button>
          </div>
        </div>
      </div>

      <!-- EMPTY SLOT -->
      <div class="loop-card empty">🔒</div>
      

    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="nav rmargin">
        <button id="saveGame">Save</button>
        <button id="loadGame">Load</button>
        <button id="resetGame">Reset</button>
        <button id="autosave">autosave</button>
        <button id="autoload">autoload</button>
        <span id="next-autosave">0</span>
    </div>
    
    <div class="nav lmargin">
      <button class="nav-btn locked">Locked 🔒</button>
      <button class="nav-btn locked">Locked 🔒</button>
    </div>

  </div>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
